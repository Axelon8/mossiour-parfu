<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Приключенията на Мосю Парфу</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="game-shell">
      <section class="hud" aria-label="Състояние на играта">
        <div>
          <p class="eyebrow title-script">Приключенията на Мосю Парфу</p>
          <h1>Премини между покривите.</h1>
        </div>
        <div class="scoreboard" aria-live="polite">
          <span>Точки</span>
          <strong id="score">0</strong>
        </div>
      </section>

      <section class="stage-wrap" aria-label="Игрално поле">
        <canvas id="game" width="420" height="640" aria-label="Игра в стил Flappy с котарак в цветове на енот"></canvas>
        <div class="overlay" id="overlay">
          <p class="status" id="status">Готови</p>
          <button id="startButton" type="button">Започни игра</button>
          <p class="hint">Докосни, кликни или натисни Space за скок.</p>
        </div>
      </section>

      <section class="controls" aria-label="Контроли">
        <button class="icon-button" id="flapButton" type="button" aria-label="Скок">^</button>
        <button id="restartButton" type="button">Отначало</button>
        <p>Най-добър: <strong id="best">0</strong></p>
      </section>
    </main>

    <script src="game.js"></script>
  </body>
</html>
